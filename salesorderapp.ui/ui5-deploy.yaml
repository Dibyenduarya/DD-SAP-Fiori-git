# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: salesorderapp.ui
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S4HANA
          url: http://s4hana2020.bas:8128
          client: '800'
        app:
          name: ZFIORI_R1_DD
          description: Manage Product Application
          package: ZFIORI_DD
          transport: TTAK903426
        exclude:
          - /test/
          - /localService/
